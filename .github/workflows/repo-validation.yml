name: Repo Validation

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository validation
        run: bash scripts/check_repo.sh
