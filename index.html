    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/png" href="assets/brand/paradiso-favicon-o.png?v=2">

    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ff: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --ff-logo: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --ff-display: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Paradiso 후보</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        // Paradiso backend URL override.
        // Set window.PARADISO_BACKEND_URL to point the frontend at a
        // specific backend (e.g. a Railway deployment). When unset, the
        // frontend falls back to same-origin (""), which is correct for
        // local dev and any deployment that proxies /api/* to the backend.
        window.PARADISO_BACKEND_URL = window.PARADISO_BACKEND_URL || "";
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
