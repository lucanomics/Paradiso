
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Paradiso 후보</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        // Paradiso backend URL override.
        // Set window.PARADISO_BACKEND_URL to point the frontend at a
        // specific backend (e.g. a Railway deployment). When unset, the
        // frontend falls back to same-origin (""), which is correct for
        // local dev and any deployment that proxies /api/* to the backend.
        window.PARADISO_BACKEND_URL = window.PARADISO_BACKEND_URL || "";
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
